min_version = "2026.7.0"

[settings]
lockfile = true
lockfile_platforms = ["linux-x64", "linux-arm64"]

[bootstrap.packages]
"apt:bc" = "latest"
"apt:bison" = "latest"
"apt:build-essential" = "latest"
"apt:curl" = "latest"
"apt:e2fsprogs" = "latest"
"apt:file" = "latest"
"apt:flex" = "latest"
"apt:gcc-arm-linux-gnueabihf" = "latest"
"apt:git" = "latest"
"apt:iproute2" = "latest"
"apt:iw" = "latest"
"apt:libarchive-dev" = "latest"
"apt:libelf-dev" = "latest"
"apt:libfdt-dev" = "latest"
"apt:libglib2.0-dev" = "latest"
"apt:libpixman-1-dev" = "latest"
"apt:libslirp-dev" = "latest"
"apt:make" = "latest"
"apt:mtp-tools" = "latest"
"apt:ninja-build" = "latest"
"apt:novnc" = "latest"
"apt:pkg-config" = "latest"
"apt:qemu-system-arm" = "latest"
"apt:ripgrep" = "latest"
"apt:socat" = "latest"
"apt:u-boot-tools" = "latest"
"apt:usbutils" = "latest"
"apt:util-linux" = "latest"
"apt:websockify" = "latest"

[tasks.setup]
description = "Provision the Ubuntu host with mise"
run = "mise bootstrap --yes"

[tasks.bootstrap]
description = "Install running-kernel USB/IP support"
run = '''
sudo env DEBIAN_FRONTEND=noninteractive apt-get install -y \
  "linux-modules-extra-$(uname -r)" \
  "linux-tools-$(uname -r)"
'''

[tasks.fetch]
description = "Download and verify the official KT6 5.19.2 OTA"
run = "./kindish fetch"

[tasks.extract]
description = "Extract the Amazon root filesystem and boot images"
run = "./kindish extract"

[tasks.inspect]
description = "Inspect OTA and root filesystem metadata"
run = "./kindish inspect"

[tasks.start]
description = "Boot KindleOS as a full ARM virtual machine"
run = "sudo ./kindish start"

[tasks.online]
description = "Boot the online KindleOS full-system VM"
run = "sudo ./kindish start"

[tasks.stop]
description = "Stop KindleOS and preserve its writable state"
run = "sudo ./kindish stop"

[tasks.status]
description = "Show simulator and virtual MTP status"
run = "./kindish status"

[tasks.power]
description = "Press the Kindle power button"
run = "./scripts/power-button.sh"

[tasks."mtp:start"]
description = "Attach the actual Kindle MTP responder as virtual USB"
run = "sudo ./kindish mtp-start"

[tasks."mtp:stop"]
description = "Detach virtual USB MTP"
run = "sudo ./kindish mtp-stop"

[tasks.check]
description = "Run source-level validation"
run = '''
bash -n kindish scripts/*.sh
git diff --check
'''
