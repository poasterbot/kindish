min_version = "2026.7.0"

[settings]
lockfile = true
lockfile_platforms = ["linux-x64", "linux-arm64"]

[tools]
python = "3.12"

[bootstrap.packages]
"apt:binfmt-support" = "latest"
"apt:build-essential" = "latest"
"apt:curl" = "latest"
"apt:e2fsprogs" = "latest"
"apt:file" = "latest"
"apt:gcc-arm-linux-gnueabihf" = "latest"
"apt:git" = "latest"
"apt:hostapd" = "latest"
"apt:iproute2" = "latest"
"apt:iw" = "latest"
"apt:libarchive-dev" = "latest"
"apt:libglib2.0-dev" = "latest"
"apt:libpixman-1-dev" = "latest"
"apt:libssl-dev" = "latest"
"apt:make" = "latest"
"apt:ninja-build" = "latest"
"apt:dnsmasq-base" = "latest"
"apt:mtp-tools" = "latest"
"apt:novnc" = "latest"
"apt:python3-pip" = "latest"
"apt:python3-venv" = "latest"
"apt:pkg-config" = "latest"
"apt:qemu-user-static" = "latest"
"apt:ripgrep" = "latest"
"apt:socat" = "latest"
"apt:u-boot-tools" = "latest"
"apt:usbutils" = "latest"
"apt:util-linux" = "latest"
"apt:websockify" = "latest"
"apt:x11-utils" = "latest"
"apt:x11vnc" = "latest"
"apt:xdotool" = "latest"
"apt:zlib1g-dev" = "latest"

[tasks.setup]
description = "Provision the Ubuntu host with mise"
run = "mise bootstrap --yes"

[tasks.bootstrap]
description = "Install running-kernel dependencies and build virtual USB support"
run = '''
sudo env DEBIAN_FRONTEND=noninteractive apt-get install -y \
  "linux-headers-$(uname -r)" \
  "linux-modules-extra-$(uname -r)" \
  "linux-tools-$(uname -r)"
sudo ./scripts/build-dummy-hcd.sh >/dev/null
'''

[tasks.fetch]
description = "Download and verify the official KT6 5.19.2 OTA"
run = "./kindish fetch"

[tasks.extract]
description = "Extract the Amazon root filesystem and boot images"
run = "./kindish extract"

[tasks.inspect]
description = "Inspect OTA and root filesystem metadata"
run = "./kindish inspect"

[tasks.start]
description = "Start the offline KindleOS simulator"
run = "sudo ./kindish start"

[tasks.online]
description = "Start KindleOS with isolated virtual Wi-Fi and Internet access"
run = "sudo ./kindish start --online"

[tasks.stop]
description = "Stop KindleOS and preserve its writable state"
run = "sudo ./kindish stop"

[tasks.status]
description = "Show simulator and virtual MTP status"
run = "./kindish status"

[tasks."mtp:start"]
description = "Attach the actual Kindle MTP responder as virtual USB"
run = "sudo ./kindish mtp-start"

[tasks."mtp:stop"]
description = "Detach virtual USB MTP"
run = "sudo ./kindish mtp-stop"

[tasks.check]
description = "Run source-level validation"
run = '''
bash -n kindish scripts/*.sh guest/*.sh
python3 -m py_compile scripts/init-content-catalog.py
gcc -fsyntax-only -Wall -Wextra src/kindish_uinput.c
gcc -fsyntax-only -Wall -Wextra src/kindish_shim.c
git diff --check
'''
