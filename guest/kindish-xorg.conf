Section "ServerFlags"
    Option "AutoAddDevices" "false"
    Option "AutoEnableDevices" "false"
    Option "DontVTSwitch" "true"
    Option "DontZap" "true"
    Option "BlankTime" "0"
    Option "StandbyTime" "0"
    Option "SuspendTime" "0"
    Option "OffTime" "0"
    Option "NoPM" "true"
    Option "IgnoreABI" "true"
EndSection

Section "Device"
    Identifier "eink"
    Driver "mtk"
    Option "fbdev" "/dev/fb0"
    Option "FormatEPDC" "Y8"
    Option "NoAccel" "true"
    Option "BackingStore" "true"
EndSection

Section "Monitor"
    Identifier "EinkPanel"
    DisplaySize 90 122
EndSection

# A host uinput device models the KT6's zforce-style absolute touchscreen.
# Kindle's own multitouch X driver turns it into the core pointer; VNC then
# injects events through the XTEST path used by normal X clients.
Section "InputDevice"
    Identifier "multitouch"
    Driver "multitouch"
    Option "Device" "/dev/input/kindish-touch"
    Option "CorePointer"
    Option "AlwaysCore"
    Option "AccelerationProfile" "-1"
    Option "AccelerationScheme" "none"
    Option "multitouch" "1"
    Option "SizeXMM" "90"
    Option "SizeYMM" "122"
EndSection

Section "Screen"
    Identifier "Kscreen"
    Device "eink"
    Monitor "EinkPanel"
    DefaultDepth 8
    SubSection "Display"
        Depth 8
        Visual "StaticGray"
        Modes "1072x1448"
    EndSubSection
EndSection

Section "ServerLayout"
    Identifier "KindishLayout"
    Screen "Kscreen"
    InputDevice "multitouch"
EndSection
